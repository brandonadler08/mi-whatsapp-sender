version: '3.9'

services:
  wa-sender:
    build: .
    container_name: wa-sender
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      # SQLite database — persisted between restarts
      - wa_data:/app/backend/data
      # WhatsApp session credentials — persisted between restarts
      - wa_auth:/app/backend/.wwebjs_auth
    # Recursos limitados: ajusta según tu servidor
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.5'
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  wa_data:
  wa_auth:
